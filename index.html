<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>SpinVillage Saga</title>
<style>
body {
    background: linear-gradient(to bottom, #1a1a2e, #0b0c1a);
    color: white;
    font-family: 'Comic Sans MS', Arial, sans-serif;
    text-align: center;
    margin: 0;
    padding: 20px;
}

h1 { 
    color: gold; 
    text-shadow: 2px 2px 5px #ff0000;
    font-size: 3em;
}

button {
    padding: 15px 30px;
    font-size: 20px;
    margin: 10px;
    border: none;
    border-radius: 15px;
    background: linear-gradient(45deg, #ff5f6d, #ffc371);
    color: white;
    cursor: pointer;
    box-shadow: 0 5px 15px rgba(0,0,0,0.3);
    transition: transform 0.1s, box-shadow 0.2s;
}

button:hover {
    box-shadow: 0 10px 20px rgba(255,255,255,0.4);
    transform: scale(1.05);
}

button:active { 
    transform: scale(0.95); 
    box-shadow: 0 3px 10px rgba(0,0,0,0.2);
}

.card {
    background: linear-gradient(to bottom, #16213e, #0f3460);
    padding: 20px;
    margin: 20px auto;
    border-radius: 20px;
    width: 300px;
    box-shadow: 0 8px 20px rgba(0,0,0,0.5);
    transition: transform 0.2s;
}

.card:hover {
    transform: translateY(-5px);
}

#spinner {
    margin: 30px auto;
    width: 100px;
    height: 100px;
    border: 10px solid #e94560;
    border-top: 10px solid gold;
    border-radius: 50%;
    animation: spin 1s ease-in-out;
    display: none;
}

@keyframes spin {
    0% { transform: rotate(0deg);}
    100% { transform: rotate(360deg);}
}
</style>
</head>
<body>

<h1>🏰 SpinVillage Saga 🎰</h1>

<div class="card">
    <p>💰 Moedas: <span id="coins">200</span></p>
    <p>🎰 Spins: <span id="spins">20</span></p>
    <p>🛡️ Escudos: <span id="shields">0</span></p>
</div>

<div id="spinner"></div>
<button onclick="spin()">GIRAR 🎰</button>

<div class="card">
    <h2 id="villageName">🌲 Vila da Floresta</h2>
    <p>Construções: <span id="buildings">0</span>/3</p>
    <button onclick="build()">Construir 🏗️</button>
</div>

<script>
let coins = 200;
let spins = 20;
let shields = 0;
let villageIndex = 0;

const villages = [
    { name: "🌲 Vila da Floresta", costs: [200,300,400], built: 0 },
    { name: "🏜️ Vila do Deserto", costs: [400,500,600], built: 0 },
    { name: "❄️ Vila Congelada", costs: [600,800,1000], built: 0 }
];

function updateUI(){
    document.getElementById("coins").innerText = coins;
    document.getElementById("spins").innerText = spins;
    document.getElementById("shields").innerText = shields;
    document.getElementById("villageName").innerText = villages[villageIndex].name;
    document.getElementById("buildings").innerText = villages[villageIndex].built;
}

function spin(){
    if(spins <= 0){
        alert("Sem spins!");
        return;
    }
    spins--;
    const spinner = document.getElementById("spinner");
    spinner.style.display = "block";
    spinner.style.animation = "spin 1s ease-in-out";

    setTimeout(() => {
        spinner.style.display = "none";

        let reward = Math.floor(Math.random()*4);
        if(reward === 0){
            coins += 100;
            alert("Você ganhou 100 moedas!");
        } else if(reward === 1){
            coins += 200;
            alert("Ataque bem-sucedido! +200 moedas!");
        } else if(reward === 2){
            shields++;
            alert("Você ganhou 1 escudo!");
        } else {
            coins += 50;
            alert("Pequena recompensa! +50 moedas!");
        }

        saveGame();
        updateUI();
    }, 1000);
}

function build(){
    let village = villages[villageIndex];

    if(village.built >= 3){
        alert("Vila completa!");
        return;
    }

    let cost = village.costs[village.built];

    if(coins >= cost){
        coins -= cost;
        village.built++;

        if(village.built === 3 && villageIndex < villages.length-1){
            villageIndex++;
            alert("Nova vila desbloqueada!");
        }

        saveGame();
        updateUI();
    } else {
        alert("Moedas insuficientes!");
    }
}

function saveGame(){
    localStorage.setItem("spinVillageSave", JSON.stringify({
        coins, spins, shields, villageIndex, villages
    }));
}

function loadGame(){
    let data = localStorage.getItem("spinVillageSave");
    if(data){
        let save = JSON.parse(data);
        coins = save.coins;
        spins = save.spins;
        shields = save.shields;
        villageIndex = save.villageIndex;
        Object.assign(villages, save.villages);
    }
}

loadGame();
updateUI();
</script>

</body>
</html>
