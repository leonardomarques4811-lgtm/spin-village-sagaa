<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>SpinVillage Saga 🎰</title>
<style>
body {
    background: linear-gradient(to bottom, #1a1a2e, #0b0c1a);
    color: white;
    font-family: 'Comic Sans MS', Arial, sans-serif;
    text-align: center;
    margin: 0;
    padding: 20px;
}

h1 { 
    color: gold; 
    text-shadow: 2px 2px 5px #ff0000;
    font-size: 3em;
}

button {
    padding: 15px 30px;
    font-size: 20px;
    margin: 10px;
    border: none;
    border-radius: 15px;
    background: linear-gradient(45deg, #ff5f6d, #ffc371);
    color: white;
    cursor: pointer;
    box-shadow: 0 5px 15px rgba(0,0,0,0.3);
    transition: transform 0.1s, box-shadow 0.2s;
}
button:hover {
    box-shadow: 0 10px 20px rgba(255,255,255,0.4);
    transform: scale(1.05);
}
button:active { 
    transform: scale(0.95); 
    box-shadow: 0 3px 10px rgba(0,0,0,0.2);
}

.card {
    background: linear-gradient(to bottom, #16213e, #0f3460);
    padding: 20px;
    margin: 20px auto;
    border-radius: 20px;
    width: 300px;
    box-shadow: 0 8px 20px rgba(0,0,0,0.5);
    transition: transform 0.2s;
}
.card:hover { transform: translateY(-5px); }

/* Roleta com imagens */
#wheel-container {
    position: relative;
    width: 300px;
    height: 300px;
    margin: 20px auto;
}
#wheel {
    width: 100%;
    height: 100%;
    border-radius: 50%;
    position: relative;
    overflow: hidden;
    border: 5px solid #e94560;
    box-shadow: 0 0 20px rgba(0,0,0,0.5);
}

.sector {
    position: absolute;
    width: 50%;
    height: 50%;
    top: 50%;
    left: 50%;
    transform-origin: 0% 0%;
    overflow: visible;
}

.sector img {
    width: 60px;
    position: absolute;
    top: -30px;
    left: -30px;
}

/* Ponteiro */
#pointer {
    position: absolute;
    top: -10px;
    left: 50%;
    width: 0;
    height: 0;
    border-left: 15px solid transparent;
    border-right: 15px solid transparent;
    border-bottom: 25px solid #e94560;
    transform: translateX(-50%);
}
</style>
</head>
<body>

<h1>🏰 SpinVillage Saga 🎰</h1>

<div class="card">
    <p>💰 Moedas: <span id="coins">200</span></p>
    <p>🎰 Spins: <span id="spins">20</span></p>
    <p>🛡️ Escudos: <span id="shields">0</span></p>
</div>

<div id="wheel-container">
    <div id="pointer"></div>
    <div id="wheel"></div>
</div>

<button onclick="spinWheel()">GIRAR ROLETA 🎰</button>

<div class="card">
    <h2 id="villageName">🌲 Vila da Floresta</h2>
    <p>Construções: <span id="buildings">0</span>/3</p>
    <button onclick="build()">Construir 🏗️</button>
</div>

<script>
let coins = 200;
let spins = 20;
let shields = 0;
let villageIndex = 0;

const villages = [
    { name: "🌲 Vila da Floresta", costs: [200,300,400], built: 0 },
    { name: "🏜️ Vila do Deserto", costs: [400,500,600], built: 0 },
    { name: "❄️ Vila Congelada", costs: [600,800,1000], built: 0 }
];

function updateUI(){
    document.getElementById("coins").innerText = coins;
    document.getElementById("spins").innerText = spins;
    document.getElementById("shields").innerText = shields;
    document.getElementById("villageName").innerText = villages[villageIndex].name;
    document.getElementById("buildings").innerText = villages[villageIndex].built;
}

/* Criar roleta com imagens */
const wheel = document.getElementById("wheel");
const rewards = [
    { type: "coins", img: "https://i.imgur.com/1KegWPz.png", value: 100 }, // moeda
    { type: "attack", img: "https://i.imgur.com/2M0x1hL.png", value: 200 }, // ataque
    { type: "shield", img: "https://i.imgur.com/6dX0A5b.png", value: 1 },   // escudo
    { type: "coins", img: "https://i.imgur.com/1KegWPz.png", value: 50 }   // pequena moeda
];

function createWheel(){
    const sectors = rewards.length;
    for(let i=0; i<sectors; i++){
        const div = document.createElement("div");
        div.className = "sector";
        div.style.transform = `rotate(${i*360/sectors}deg) skewY(-60deg)`;
        const img = document.createElement("img");
        img.src = rewards[i].img;
        div.appendChild(img);
        wheel.appendChild(div);
    }
}
createWheel();

function spinWheel(){
    if(spins <=0){
        alert("Sem spins!");
        return;
    }
    spins--;

    const sectors = rewards.length;
    const randomIndex = Math.floor(Math.random()*sectors);
    const spinsCount = 5;
    const angle = 360/spins.length;
    const rotation = spinsCount*360 + randomIndex*(360/sectors) + (360/sectors)/2;

    wheel.style.transition = "transform 4s cubic-bezier(0.33, 1, 0.68, 1)";
    wheel.style.transform = `rotate(${rotation}deg)`;

    setTimeout(()=>{
        const reward = rewards[randomIndex];
        if(reward.type === "coins") coins += reward.value;
        else if(reward.type === "attack") coins += reward.value;
        else if(reward.type === "shield") shields += reward.value;

        alert(`🎉 Você ganhou: ${reward.type==="coins"?reward.value+" moedas":reward.type==="shield"?reward.value+" escudo(s)":"Ataque! +" + reward.value}`);
        saveGame();
        updateUI();
    }, 4000);
}

function build(){
    let village = villages[villageIndex];

    if(village.built >= 3){
        alert("Vila completa!");
        return;
    }

    let cost = village.costs[village.built];

    if(coins >= cost){
        coins -= cost;
        village.built++;

        if(village.built === 3 && villageIndex < villages.length-1){
            villageIndex++;
            alert("Nova vila desbloqueada!");
        }

        saveGame();
        updateUI();
    } else {
        alert("Moedas insuficientes!");
    }
}

function saveGame(){
    localStorage.setItem("spinVillageSave", JSON.stringify({
        coins, spins, shields, villageIndex, villages
    }));
}

function loadGame(){
    let data = localStorage.getItem("spinVillageSave");
    if(data){
        let save = JSON.parse(data);
        coins = save.coins;
        spins = save.spins;
        shields = save.shields;
        villageIndex = save.villageIndex;
        Object.assign(villages, save.villages);
    }
}

loadGame();
updateUI();
</script>
</body>
</html>
